<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: Arial, sans-serif; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">🖱️ 拖动旋转 | 滚轮缩放</div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        const info = document.getElementById('info');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(20, 20, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 控制器
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 网格
        const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
        scene.add(gridHelper);

        // 光源
        const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
        keyLight.position.set(10, 12, 10);
        scene.add(keyLight);

        const fillLight = new THREE.DirectionalLight(0xffffff, 0.6);
        fillLight.position.set(-8, 6, -8);
        scene.add(fillLight);

        scene.add(new THREE.HemisphereLight(0xffffff, 0x222222, 0.9));

        function frameModel(model) {
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const maxDimension = Math.max(size.x, size.y, size.z);

            const fov = THREE.MathUtils.degToRad(camera.fov);
            const cameraDistance = camera.position.distanceTo(controls.target);
            const visibleHeight = 2 * Math.tan(fov / 2) * cameraDistance;
            const visibleWidth = visibleHeight * camera.aspect;
            const targetSize = Math.min(visibleHeight, visibleWidth) * 0.6;
            const scale = maxDimension > 0 ? targetSize / maxDimension : 1;

            model.scale.setScalar(scale);
            model.updateMatrixWorld(true);

            const scaledBox = new THREE.Box3().setFromObject(model);
            const scaledSize = scaledBox.getSize(new THREE.Vector3());
            const scaledCenter = scaledBox.getCenter(new THREE.Vector3());

            model.position.sub(scaledCenter);
            model.position.y += scaledSize.y / 2;

            camera.near = Math.max(scaledSize.length() / 100, 0.1);
            camera.far = Math.max(scaledSize.length() * 20, 1000);
            camera.updateProjectionMatrix();

            controls.minDistance = Math.max(scaledSize.length() * 0.2, 1);
            controls.maxDistance = Math.max(scaledSize.length() * 4, 50);
            controls.update();
        }

        const loader = new THREE.GLTFLoader();
        info.textContent = '⏳ 正在加载 BMW 模型...';

        loader.load(
            'model/1973_bmw_3.0_csl_rhd_e9.glb',
            (gltf) => {
                const model = gltf.scene;
                scene.add(model);
                frameModel(model);
                info.textContent = '🖱️ 拖动旋转 | 滚轮缩放';
            },
            undefined,
            (error) => {
                console.error('模型加载失败:', error);
                info.textContent = '❌ BMW 模型加载失败，请检查文件路径';
            }
        );

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
