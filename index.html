<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="Noah">
    <meta name="description" content="hqqich 导航页">
    <meta name="keywords" content="导航页,hqqich">
    <meta name="theme-color" content="#01a982">
    <title>hqqich 导航页</title>
    <link rel="icon" href="favicon.ico">
    <style>
        :root {
            color-scheme: light;
            --bg-start: #01a982;
            --bg-end: #60ae80;
            --panel-bg: rgba(255, 255, 255, 0.96);
            --panel-border: rgba(255, 255, 255, 0.3);
            --text-main: #16302d;
            --text-muted: #5b6e6b;
            --accent: #029c77;
            --accent-dark: #017f61;
            --shadow: 0 24px 60px rgba(0, 0, 0, 0.16);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            color: #fff;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page {
            position: relative;
            isolation: isolate;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 48px 20px;
            overflow: hidden;
        }

        .hero {
            position: relative;
            z-index: 1;
            width: min(100%, 720px);
            text-align: center;
        }

        .hero h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            letter-spacing: 0.08em;
            margin-bottom: 16px;
        }

        .hero p {
            color: rgba(255, 255, 255, 0.88);
            font-size: 1rem;
            margin-bottom: 28px;
        }

        .card {
            text-align: left;
            background: var(--panel-bg);
            color: var(--text-main);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(8px);
            overflow: hidden;
        }

        .card-header {
            padding: 20px 24px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #fff;
        }

        .card-header h2 {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .card-body {
            padding: 12px 20px 8px;
        }

        .nav-list {
            list-style: none;
        }

        .nav-list li + li {
            border-top: 1px solid rgba(22, 48, 45, 0.08);
        }

        .nav-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 18px 8px;
            transition: transform 0.2s ease, color 0.2s ease;
        }

        .nav-link:hover,
        .nav-link:focus-visible {
            color: var(--accent-dark);
            transform: translateX(4px);
            outline: none;
        }

        .nav-link strong {
            font-size: 1rem;
            font-weight: 600;
        }

        .nav-link span {
            color: var(--text-muted);
            font-size: 0.95rem;
            white-space: nowrap;
        }

        .footer {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.86);
            font-size: 0.95rem;
        }

        .bg-bubbles {
            position: absolute;
            inset: 0;
            z-index: 0;
            list-style: none;
            pointer-events: none;
        }

        .bg-bubbles li {
            position: absolute;
            bottom: -180px;
            background: rgba(255, 255, 255, 0.16);
            border-radius: 18%;
            animation: float-up linear infinite;
        }

        .bg-bubbles li:nth-child(1) {
            left: 8%;
            width: 44px;
            height: 44px;
            animation-duration: 20s;
        }

        .bg-bubbles li:nth-child(2) {
            left: 18%;
            width: 88px;
            height: 88px;
            animation-delay: 2s;
            animation-duration: 15s;
        }

        .bg-bubbles li:nth-child(3) {
            left: 30%;
            width: 34px;
            height: 34px;
            animation-delay: 4s;
            animation-duration: 18s;
        }

        .bg-bubbles li:nth-child(4) {
            left: 42%;
            width: 64px;
            height: 64px;
            animation-duration: 22s;
            background: rgba(255, 255, 255, 0.22);
        }

        .bg-bubbles li:nth-child(5) {
            left: 58%;
            width: 52px;
            height: 52px;
            animation-delay: 1s;
            animation-duration: 17s;
        }

        .bg-bubbles li:nth-child(6) {
            left: 72%;
            width: 120px;
            height: 120px;
            animation-delay: 3s;
            animation-duration: 24s;
        }

        .bg-bubbles li:nth-child(7) {
            left: 82%;
            width: 160px;
            height: 160px;
            animation-delay: 6s;
            animation-duration: 27s;
        }

        .bg-bubbles li:nth-child(8) {
            left: 50%;
            width: 20px;
            height: 20px;
            animation-delay: 10s;
            animation-duration: 28s;
        }

        .bg-bubbles li:nth-child(9) {
            left: 24%;
            width: 12px;
            height: 12px;
            animation-delay: 8s;
            animation-duration: 30s;
        }

        .bg-bubbles li:nth-child(10) {
            left: 90%;
            width: 86px;
            height: 86px;
            animation-delay: 12s;
            animation-duration: 23s;
        }

        @keyframes float-up {
            from {
                transform: translateY(0) rotate(0deg);
            }

            to {
                transform: translateY(-110vh) rotate(540deg);
            }
        }

        @media (max-width: 640px) {
            .page {
                padding: 32px 16px;
            }

            .card-header,
            .card-body {
                padding-left: 16px;
                padding-right: 16px;
            }

            .nav-link {
                padding: 16px 4px;
            }

            .nav-link strong,
            .nav-link span {
                font-size: 0.95rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .bg-bubbles li,
            .nav-link {
                animation: none;
                transition: none;
                transform: none;
            }
        }
    </style>
</head>
